<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="KRONOS — Brutally minimal gym timer and streak tracker. Custom interval training, stopwatch, and training streak heatmap." />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Kronos</title>
    <link rel="icon" type="image/png" href="/kronos/favicon.png" />
    <link rel="manifest" href="/kronos/manifest.json" />
    <link rel="apple-touch-icon" href="/kronos/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/kronos/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
